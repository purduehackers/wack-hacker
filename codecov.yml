coverage:
  status:
    project:
      default:
        # Allow a small drop since tool files are intentionally excluded (they
        # hit external SDKs; real coverage happens in the library code they
        # call into).
        threshold: 2%
    patch:
      default:
        target: 90%
ignore:
  # Match vitest.config.ts coverage.exclude so codecov patch coverage reflects
  # the same testable surface the repo actually measures.
  - "src/app/**"
  - "src/env.ts"
  - "src/server/**"
  - "src/workflows/**"
  - "src/bot/handlers/**"
  - "src/bot/integrations/**"
  - "src/lib/ascii.ts"
  - "src/lib/test/**"
  - "src/lib/protocol/utils.ts"
  - "src/**/*.test.ts"
  - "src/**/errors.ts"
  - "src/**/types.ts"
  - "src/**/enums.ts"
  - "src/**/constants.ts"
  - "src/lib/ai/skills/generated/**"
  - "src/lib/ai/tools/**"
  - "src/lib/evlog.ts"
  - "src/lib/db/**"
  - "src/lib/sandbox/vercel-sandbox.ts"
  - "src/lib/sandbox/factory.ts"
